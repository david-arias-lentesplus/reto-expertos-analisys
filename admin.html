<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin – Resultados | Desafío Expertos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="js/partidos-data.js"></script>
  <script src="js/scoring.js"></script>
  <style>
    :root {
      --navy:#0d1b4b; --gold:#f5a800; --gold2:#ffd060;
      --green:#22c55e; --red:#ef4444; --gray:#94a3b8;
      --bg:#f0f4f8; --card:#ffffff; --text:#1e293b; --border:#e2e8f0;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }

    nav {
      background:var(--navy); padding:0 24px;
      display:flex; align-items:center; gap:0;
      position:sticky; top:0; z-index:100;
      box-shadow:0 2px 8px rgba(0,0,0,.4);
    }
    .nav-brand { color:var(--gold); font-weight:700; font-size:1.1rem; padding:16px 24px 16px 0; border-right:1px solid rgba(255,255,255,.15); margin-right:8px; white-space:nowrap; }
    .nav-brand span { color:#fff; font-weight:400; }
    nav a { color:rgba(255,255,255,.75); text-decoration:none; padding:16px 18px; font-size:.9rem; transition:all .2s; border-bottom:3px solid transparent; }
    nav a:hover  { color:#fff; background:rgba(255,255,255,.06); }
    nav a.active { color:var(--gold); border-bottom-color:var(--gold); font-weight:600; }

    .hero { background:linear-gradient(135deg,var(--navy) 0%,#1a3a8f 100%); padding:28px 24px; color:#fff; }
    .hero h1 { font-size:1.5rem; font-weight:700; margin-bottom:6px; }
    .hero p  { color:rgba(255,255,255,.7); font-size:.9rem; }

    /* Status banner */
    #statusBanner {
      padding:11px 24px; font-size:.85rem; font-weight:600;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    }
    .banner-ok   { background:#dcfce7; color:#166534; }
    .banner-warn { background:#fef3c7; color:#92400e; }
    .banner-err  { background:#fee2e2; color:#991b1b; }
    .banner-loading { background:#f1f5f9; color:#475569; }

    /* Toolbar */
    .toolbar {
      background:#fff; border-bottom:1px solid var(--border);
      padding:10px 24px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }
    .btn {
      padding:8px 18px; border-radius:8px; border:none; cursor:pointer;
      font-size:.85rem; font-weight:600; transition:all .2s; text-decoration:none;
      display:inline-flex; align-items:center; gap:6px;
    }
    .btn-primary  { background:var(--gold); color:#000; }
    .btn-primary:hover  { background:var(--gold2); }
    .btn-sheets   { background:#1a73e8; color:#fff; }
    .btn-sheets:hover   { background:#1558b0; }

    .progress-info { margin-left:auto; font-size:.82rem; color:var(--gray); }
    .progress-info b { color:var(--navy); }

    /* Date filter */
    .date-filter {
      background:#fff; border-bottom:1px solid var(--border);
      padding:10px 24px; overflow-x:auto; display:flex; gap:8px;
    }
    .date-btn {
      padding:6px 14px; border-radius:20px; border:1px solid var(--border);
      background:var(--bg); cursor:pointer; font-size:.78rem; white-space:nowrap;
      transition:all .2s;
    }
    .date-btn:hover  { border-color:var(--gold); }
    .date-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
    .date-btn.done   { background:#dcfce7; border-color:#86efac; color:#166534; }

    /* Content */
    .content { padding:24px; max-width:960px; }

    .date-section { margin-bottom:28px; }
    .date-heading {
      font-size:.9rem; font-weight:700; color:var(--navy);
      padding:8px 0; margin-bottom:12px;
      border-bottom:2px solid var(--gold);
      display:flex; align-items:center; gap:8px;
    }
    .date-heading .cnt { font-size:.75rem; color:var(--gray); font-weight:400; }

    .match-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:10px; padding:16px 20px;
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:center; gap:16px;
      margin-bottom:10px;
    }
    .match-card.has-result { border-left:4px solid var(--green); }
    .match-card.pending    { border-left:4px solid var(--border); }

    .team-name { font-weight:700; font-size:.95rem; }
    .team-local { text-align:right; }
    .team-visitante { text-align:left; }
    .match-meta {
      font-size:.72rem; color:var(--gray); margin-top:4px;
      display:flex; gap:8px; align-items:center;
    }
    .team-local .match-meta { justify-content:flex-end; }

    .phase-tag {
      font-size:.68rem; padding:2px 8px; border-radius:10px; font-weight:600;
    }
    .phase-g { background:#e0e7ff; color:#3730a3; }
    .phase-7 { background:#fef3c7; color:#92400e; }
    .phase-8 { background:#fee2e2; color:#991b1b; }
    .phase-9 { background:#fde68a; color:#78350f; }
    .phase-f { background:#ffd700; color:#000; }

    /* Score display */
    .score-display {
      text-align:center;
    }
    .score-badge {
      display:inline-flex; align-items:center; gap:6px;
      padding:10px 20px; border-radius:10px;
      font-size:1.4rem; font-weight:800;
    }
    .score-badge.has-score { background:#dcfce7; color:#166534; }
    .score-badge.no-score  { background:#f1f5f9; color:#94a3b8; font-size:.85rem; font-weight:500; padding:12px 18px; }
    .score-sep { color:var(--gray); font-size:1.2rem; }
    .match-id-label { font-size:.7rem; color:var(--gray); margin-top:5px; }

    /* Spinner */
    .spinner-wrap { text-align:center; padding:60px 24px; color:var(--gray); }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Readonly notice */
    .readonly-notice {
      background:#eff6ff; border:1px solid #bfdbfe;
      border-radius:10px; padding:14px 18px;
      margin-bottom:20px; font-size:.85rem; color:#1e40af;
      display:flex; align-items:center; gap:10px;
    }

    @media(max-width:600px) {
      .match-card { grid-template-columns:1fr; gap:10px; }
      .team-local, .team-visitante { text-align:center; }
      .team-local .match-meta { justify-content:center; }
      .score-display { order:-1; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">⚽ Reto de <span>Expertos</span></div>
  <a href="index.html">📊 Pronósticos</a>
  <a href="admin.html" class="active">📋 Resultados</a>
  <a href="ranking.html">🏆 Ranking</a>
  <a href="clientes.html">👥 Clientes</a>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>📋 Resultados Reales</h1>
  <p>Visualización de los marcadores ingresados en Google Sheets. Edita directamente en la hoja.</p>
</div>

<!-- STATUS BANNER -->
<div id="statusBanner" class="banner-loading">⏳ Conectando con Google Sheets...</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="btn btn-primary" onclick="refresh()">🔄 Actualizar</button>
  <a class="btn btn-sheets"
     href="https://docs.google.com/spreadsheets/d/128AaqcAR-KGW-bap4micX7TUwpVkh0AmzkZcTsbyz6k/edit"
     target="_blank" rel="noopener">
    📝 Editar en Google Sheets
  </a>
  <div class="progress-info" id="progressInfo">–</div>
</div>

<!-- DATE FILTER -->
<div class="date-filter" id="dateFilter"></div>

<!-- CONTENT -->
<div class="content" id="matchContent">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <p>Cargando resultados...</p>
  </div>
</div>

<script>
let resultados = {};
let currentDateFilter = 'all';
const FECHAS = getFechasUnicas();

// ── Init / Refresh ────────────────────────────────────────────────────────
async function init() {
  const banner = document.getElementById('statusBanner');
  banner.className = 'banner-loading';
  banner.textContent = '⏳ Conectando con Google Sheets...';
  document.getElementById('progressInfo').textContent = '–';

  resultados = await fetchResultadosSheets();
  const total = Object.keys(resultados).length;

  if (total > 0) {
    banner.className = 'banner-ok';
    banner.innerHTML = '✅ Google Sheets conectado &mdash; <b>' + total + '</b> de <b>' + PARTIDOS.length + '</b> marcadores ingresados';
  } else {
    banner.className = 'banner-warn';
    banner.innerHTML = '⚠️ Sheets conectado — hoja <b>Resultados</b> sin marcadores todavía. Agrega resultados en Google Sheets y presiona <b>Actualizar</b>.';
  }

  renderDateFilter();
  renderMatches(currentDateFilter);
  updateProgress();
}

function refresh() {
  const content = document.getElementById('matchContent');
  content.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><p>Actualizando desde Google Sheets...</p></div>';
  init();
}

// ── Date filter ────────────────────────────────────────────────────────────
function renderDateFilter() {
  const byDate = {};
  PARTIDOS.forEach(p => {
    if (!byDate[p.fecha]) byDate[p.fecha] = [];
    byDate[p.fecha].push(p);
  });

  const allDone = PARTIDOS.every(p => resultados[p.id] !== undefined);
  let html = `<button class="date-btn ${currentDateFilter==='all'?'active':''} ${allDone?'done':''}"
                      onclick="filterDate('all')">Todos (${PARTIDOS.length})</button>`;

  FECHAS.forEach(f => {
    const ps = byDate[f] || [];
    const done = ps.every(p => resultados[p.id] !== undefined);
    const active = currentDateFilter === f ? 'active' : '';
    const doneClass = done ? 'done' : '';
    const [,mes,dia] = f.split('-');
    html += `<button class="date-btn ${active} ${doneClass}" onclick="filterDate('${f}')">
               ${dia}/${mes} (${ps.length})
             </button>`;
  });

  document.getElementById('dateFilter').innerHTML = html;
}

function filterDate(fecha) {
  currentDateFilter = fecha;
  renderDateFilter();
  renderMatches(fecha);
}

// ── Render matches ────────────────────────────────────────────────────────
function renderMatches(fechaFilter) {
  const partidos = fechaFilter === 'all' ? PARTIDOS
    : PARTIDOS.filter(p => p.fecha === fechaFilter);

  const byDate = {};
  partidos.forEach(p => {
    if (!byDate[p.fecha]) byDate[p.fecha] = [];
    byDate[p.fecha].push(p);
  });

  let html = `<div class="readonly-notice">
    ℹ️ Esta página es solo de lectura. Para ingresar o modificar marcadores, usa el botón <b>Editar en Google Sheets</b> y luego presiona <b>Actualizar</b>.
  </div>`;

  Object.entries(byDate).forEach(([fecha, ps]) => {
    const [y,m,d] = fecha.split('-');
    const doneCount = ps.filter(p => resultados[p.id]).length;
    html += `<div class="date-section">
      <div class="date-heading">
        📅 ${ps[0].dia} ${d}/${m}/${y}
        <span class="cnt">${doneCount}/${ps.length} ingresados</span>
      </div>`;

    ps.forEach(p => {
      const res = resultados[p.id];
      const hasResult = res !== undefined;
      const phaseClass = p.fase <= 6 ? 'phase-g' : p.fase === 7 ? 'phase-7' : p.fase === 8 ? 'phase-8' : p.fase === 9 ? 'phase-9' : 'phase-f';

      let scoreHtml;
      if (hasResult) {
        scoreHtml = `<div class="score-badge has-score">
          ${res.local} <span class="score-sep">–</span> ${res.visitante}
        </div>`;
      } else {
        scoreHtml = `<div class="score-badge no-score">Pendiente</div>`;
      }

      html += `
        <div class="match-card ${hasResult ? 'has-result' : 'pending'}">
          <div class="team-local">
            <div class="team-name">${p.local}</div>
            <div class="match-meta">
              <span class="phase-tag ${phaseClass}">${p.faseNombre}</span>
              <span>${p.puntos} pto${p.puntos > 1 ? 's' : ''}</span>
            </div>
          </div>

          <div class="score-display">
            ${scoreHtml}
            <div class="match-id-label">P${p.id}</div>
          </div>

          <div class="team-visitante">
            <div class="team-name">${p.visitante}</div>
          </div>
        </div>`;
    });
    html += '</div>';
  });

  document.getElementById('matchContent').innerHTML = html ||
    '<p style="color:var(--gray);padding:20px">Sin partidos para esta fecha.</p>';
}

// ── Progress ───────────────────────────────────────────────────────────────
function updateProgress() {
  const ingresados = Object.keys(resultados).length;
  const pct = Math.round(ingresados / PARTIDOS.length * 100);
  document.getElementById('progressInfo').innerHTML =
    `<b>${ingresados}</b> / ${PARTIDOS.length} resultados (${pct}%)`;
}

init();
</script>
</body>
</html>
