<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Clientes Lentes – Mundial 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="js/partidos-data.js"></script>
  <script src="js/scoring.js"></script>
  <style>
    :root {
      --navy:  #0d1b4b; --gold:  #f5a800; --green: #22c55e;
      --red:   #ef4444; --gray:  #94a3b8; --bg:    #f0f4f8;
      --card:  #ffffff; --text:  #1e293b; --border:#e2e8f0;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }
    nav { background:var(--navy); padding:0 24px; display:flex; align-items:center; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.4); }
    .nav-brand { color:var(--gold); font-weight:700; font-size:1.1rem; padding:16px 24px 16px 0; border-right:1px solid rgba(255,255,255,.15); margin-right:8px; white-space:nowrap; }
    .nav-brand span { color:#fff; font-weight:400; }
    nav a { color:rgba(255,255,255,.75); text-decoration:none; padding:16px 18px; font-size:.9rem; transition:all .2s; border-bottom:3px solid transparent; }
    nav a:hover  { color:#fff; background:rgba(255,255,255,.06); }
    nav a.active { color:var(--gold); border-bottom-color:var(--gold); font-weight:600; }
    .hero { background:linear-gradient(135deg, var(--navy) 0%, #1a3a8f 100%); padding:28px 24px; color:#fff; }
    .hero h1 { font-size:1.5rem; font-weight:700; margin-bottom:4px; }
    .hero p  { color:rgba(255,255,255,.7); font-size:.9rem; }
    /* Stats bar */
    .stats-bar { display:flex; gap:10px; flex-wrap:wrap; padding:12px 24px; background:#fff; border-bottom:1px solid var(--border); align-items:center; }
    .stat-chip { background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:.81rem; display:flex; align-items:center; gap:5px; }
    .stat-chip b { color:var(--navy); }
    .stats-divider { width:1px; height:22px; background:var(--border); margin:0 4px; }
    .filter-label { font-size:.75rem; color:var(--gray); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
    /* Pais bar */
    .pais-bar { display:flex; gap:10px; flex-wrap:wrap; padding:10px 24px; background:#fffbeb; border-bottom:2px solid #fde68a; align-items:center; }
    .pais-bar-label { font-size:.75rem; color:#92400e; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .pais-chip { display:flex; align-items:center; gap:6px; background:#fff; border:1px solid #fde68a; border-radius:20px; padding:4px 14px; font-size:.82rem; font-weight:600; }
    .pais-chip .pais-count { color:var(--navy); font-size:.95rem; font-weight:800; }
    .pais-total { font-size:.82rem; color:#78350f; background:#fef3c7; border-radius:12px; padding:3px 12px; font-weight:700; }
    /* Toolbar */
    .toolbar { padding:10px 24px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .mode-tabs { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .mode-tab { padding:7px 16px; font-size:.85rem; font-weight:600; cursor:pointer; border:none; background:#fff; color:var(--gray); transition:all .2s; display:flex; align-items:center; gap:5px; }
    .mode-tab.active { background:var(--navy); color:#fff; }
    .mode-tab:not(:last-child) { border-right:1px solid var(--border); }
    .search-box { flex:1; min-width:180px; max-width:280px; border:1px solid var(--border); border-radius:8px; padding:7px 12px; font-size:.88rem; outline:none; }
    .search-box:focus { border-color:var(--navy); }
    select.filter-sel { border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:.88rem; outline:none; background:#fff; cursor:pointer; }
    select.filter-sel:focus { border-color:var(--navy); }
    .btn-refresh { background:var(--navy); color:#fff; border:none; border-radius:8px; padding:7px 16px; font-size:.88rem; cursor:pointer; display:flex; align-items:center; gap:6px; }
    .btn-refresh:hover { background:#1a3a8f; }
    .btn-refresh:disabled { opacity:.5; cursor:default; }
    .btn-csv { background:#16a34a; color:#fff; border:none; border-radius:8px; padding:7px 16px; font-size:.88rem; cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap; }
    .btn-csv:hover { background:#15803d; }
    .btn-csv:disabled { opacity:.5; cursor:default; }
    .last-update { font-size:.78rem; color:var(--gray); margin-left:auto; white-space:nowrap; }
    /* Tabla */
    .table-wrap { padding:20px 24px 8px; }
    .cliente-card { background:var(--card); border-radius:10px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); overflow:hidden; }
    /* Header modo ventas */
    .cliente-header { display:grid; grid-template-columns:32px 1fr auto auto auto auto auto auto; align-items:center; gap:12px; padding:12px 16px; cursor:pointer; transition:background .15s; user-select:none; }
    .cliente-header:hover { background:#f8fafc; }
    /* Header modo marcadores */
    .cliente-header.mhdr { grid-template-columns:32px 1fr auto auto auto; }
    .cliente-rank { font-weight:800; color:var(--navy); font-size:.9rem; text-align:center; }
    .cliente-email { font-weight:600; color:var(--navy); font-size:.9rem; }
    .cliente-pais  { font-size:.8rem; color:var(--gray); }
    .badge-cajas { display:inline-block; border-radius:20px; padding:3px 12px; font-size:.82rem; font-weight:700; }
    .badge-6up { background:#fde68a; color:#78350f; }
    .badge-4   { background:#dbeafe; color:#1e40af; }
    .badge-2   { background:#dcfce7; color:#166534; }
    .toggle-icon { font-size:.8rem; color:var(--gray); transition:transform .2s; }
    .hdr-order { font-size:.8rem; color:var(--gray); white-space:nowrap; }
    .hdr-order b { color:var(--text); }
    .hdr-fab { font-size:.75rem; background:#f0fdf4; color:#166534; border-radius:10px; padding:2px 9px; font-weight:600; white-space:nowrap; }
    .orden-fab { font-size:.78rem; color:#166534; font-weight:500; }
    .cliente-card.open .toggle-icon { transform:rotate(180deg); }
    /* Info col marcadores */
    .cliente-info-col { display:flex; flex-direction:column; gap:2px; min-width:0; overflow:hidden; }
    .cliente-nombre-row { font-weight:700; color:var(--navy); font-size:.92rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cliente-email-row { font-weight:400; color:var(--gray); font-size:.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cliente-pais-badge { display:inline-flex; align-items:center; gap:4px; font-size:.75rem; font-weight:700; padding:1px 8px; border-radius:10px; width:fit-content; margin-top:2px; }
    .pais-CO { background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; }
    .pais-CL { background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; }
    .pais-MX { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }
    .pais-AR { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .pais-XX { background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; }
    /* Rank chip */
    .rank-chip { display:flex; align-items:center; gap:6px; background:#f8faff; border:1px solid #c7d2fe; border-radius:20px; padding:4px 12px; white-space:nowrap; }
    .rank-chip.gold { background:#fffbeb; border-color:#fde68a; }
    .rank-pos  { font-weight:800; color:var(--navy); font-size:.82rem; }
    .rank-pts  { font-size:.8rem; color:#4338ca; font-weight:700; }
    .rank-acc  { font-size:.75rem; color:var(--gray); }
    .rank-chip.gold .rank-pos { color:#92400e; }
    .rank-chip.gold .rank-pts { color:#b45309; }
    /* Phase breakdown */
    .phase-breakdown { padding:12px 16px 12px 60px; background:#f8faff; border-bottom:1px solid var(--border); }
    .phase-breakdown-title { font-size:.73rem; font-weight:700; color:var(--navy); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
    .phase-row { display:flex; flex-wrap:wrap; gap:6px; }
    .phase-item { display:flex; align-items:center; gap:4px; background:#fff; border:1px solid var(--border); border-radius:8px; padding:4px 10px; font-size:.75rem; }
    .ph-label { color:var(--gray); font-weight:600; }
    .ph-pts   { font-weight:800; }
    .ph-0 { color:var(--gray); }
    .ph-g { color:#3730a3; } .ph-7 { color:#92400e; } .ph-8 { color:#991b1b; }
    .ph-9 { color:#78350f; } .ph-f { color:#065f46; }
    /* Ordenes wrap */
    .ordenes-wrap { display:none; border-top:1px solid var(--border); }
    .cliente-card.open .ordenes-wrap { display:block; }
    .orden-row { padding:10px 16px 10px 60px; border-bottom:1px solid var(--border); }
    .orden-row:last-child { border-bottom:none; }
    .orden-meta { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .orden-num   { font-weight:600; font-size:.85rem; color:var(--navy); }
    .orden-fecha { font-size:.8rem; color:var(--gray); }
    .orden-cajas { font-size:.8rem; background:#f0fdf4; color:#166534; border-radius:12px; padding:2px 8px; font-weight:600; }
    .productos-list { display:block; margin-top:8px; }
    .prod-item { display:flex; align-items:center; gap:10px; padding:4px 0; font-size:.82rem; border-top:1px dashed var(--border); }
    .prod-item:first-child { border-top:none; }
    .prod-tipo { font-size:.72rem; border-radius:10px; padding:1px 7px; font-weight:600; white-space:nowrap; }
    .tipo-lentes   { background:#ede9fe; color:#5b21b6; }
    .tipo-solucion { background:#e0f2fe; color:#0369a1; }
    .tipo-gotas    { background:#fef9c3; color:#854d0e; }
    .tipo-otro     { background:#f1f5f9; color:#475569; }
    .prod-nombre { flex:1; color:var(--text); }
    .prod-marca  { color:var(--gray); font-size:.78rem; }
    .prod-cant   { font-weight:700; color:var(--navy); min-width:24px; text-align:right; }
    /* Paginador */
    .pager { display:flex; align-items:center; justify-content:center; gap:8px; padding:16px 24px 24px; }
    .pager-btn { background:#fff; border:1px solid var(--border); border-radius:8px; padding:6px 14px; font-size:.85rem; cursor:pointer; transition:all .15s; color:var(--text); }
    .pager-btn:hover:not(:disabled) { background:var(--navy); color:#fff; border-color:var(--navy); }
    .pager-btn:disabled { opacity:.4; cursor:default; }
    .pager-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); font-weight:700; }
    .pager-info { font-size:.82rem; color:var(--gray); padding:0 8px; }
    .pager-ellipsis { color:var(--gray); padding:0 4px; }
    /* Empty / Loading / Error */
    .status-box { text-align:center; padding:64px 24px; color:var(--gray); }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 14px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media(max-width:600px) {
      .table-wrap { padding:12px 12px 4px; }
      .cliente-header { grid-template-columns:28px 1fr auto auto auto; }
      .cliente-pais, .col-ordenes { display:none; }
      .cliente-header.mhdr { grid-template-columns:28px 1fr auto auto; }
      .rank-chip { display:none; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">&#9917; Reto de <span>Expertos</span></div>
  <a href="index.html">&#128202; Pron&#243;sticos</a>
  <a href="admin.html">&#128203; Resultados</a>
  <a href="ranking.html">&#127942; Ranking</a>
  <a href="clientes.html" class="active">&#128101; Clientes</a>
</nav>

<div class="hero">
  <h1>&#128101; Clientes LentesPlus &middot; Mundial 2026</h1>
  <p>LentesPlus &middot; 1 Jun &ndash; 19 Jul 2026 &middot; &Oacute;rdenes con 2+ cajas de lentes</p>
</div>

<div class="stats-bar" id="statsBar"><div class="stat-chip">&#9203; Cargando&hellip;</div></div>
<div class="pais-bar"  id="paisBar"  style="display:none"></div>

<div class="toolbar">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-marcadores" onclick="setMode('marcadores')">&#127942; Con marcadores</button>
    <button class="mode-tab"        id="tab-ventas"     onclick="setMode('ventas')">&#128202; Todas las ventas</button>
  </div>
  <input  class="search-box"  type="text"    id="searchInput"  placeholder="&#128269; Buscar por email&hellip;"  oninput="applyFilters()"/>
  <select class="filter-sel"  id="paisFilter" onchange="applyFilters()"><option value="">&#127758; Todos los pa&iacute;ses</option></select>
  <select class="filter-sel"  id="fabFilter"  onchange="applyFilters()"><option value="">&#127981; Todos los fabricantes</option></select>
  <button class="btn-csv"     id="btnCsv"     onclick="downloadCSV()">&#11015;&#65039; Descargar CSV</button>
  <button class="btn-refresh" id="btnRefresh" onclick="reloadData()">&#128260; Actualizar</button>
  <span   class="last-update" id="lastUpdate"></span>
</div>

<div class="table-wrap" id="tableWrap">
  <div class="status-box"><div class="spinner"></div><p>Cargando datos y ranking&hellip;</p></div>
</div>
<div id="pagerWrap"></div>

<script>
const FLAGS = {MX:'&#127474;&#127485;',CO:'&#127464;&#127476;',AR:'&#127462;&#127479;',CL:'&#127464;&#127473;',PE:'&#127477;&#127466;',EC:'&#127466;&#127464;',VE:'&#127483;&#127466;',BO:'&#127463;&#127476;',UY:'&#127482;&#127486;',PY:'&#127477;&#127486;',CR:'&#127464;&#127479;',PA:'&#127477;&#127462;',GT:'&#127468;&#127481;',HN:'&#127469;&#127475;',SV:'&#127480;&#127483;',NI:'&#127475;&#127470;',DO:'&#127465;&#127476;',CU:'&#127464;&#127482;',PR:'&#127477;&#127479;',US:'&#127482;&#127480;'};
const flag = c => (FLAGS[c]||'&#127760;')+' '+(c||'&mdash;');
const fmtDate = d => d ? new Date(d+'T12:00:00Z').toLocaleDateString('es-MX',{day:'2-digit',month:'short',timeZone:'UTC'}) : '&mdash;';
const CLIENTS_PER_PAGE = 50;
const FASE_LABELS = {1:'T1',2:'T2',3:'T3',4:'T4',5:'T5',6:'T6',7:'D16',8:'Oct',9:'Qtr',10:'Final'};
const FASE_CLS   = f => f<=6?'ph-g':f===7?'ph-7':f===8?'ph-8':f===9?'ph-9':'ph-f';
const PAIS_NOMBRE = {CO:'Colombia',CL:'Chile',MX:'México',AR:'Argentina'};
const PAIS_FLAGS  = {CO:'&#127464;&#127476;',CL:'&#127464;&#127473;',MX:'&#127474;&#127485;',AR:'&#127462;&#127479;'};

let allClientes      = [];
let allVentas        = [];
let clientesBase     = [];
let filteredClientes = [];
let currentPage      = 1;
let viewMode         = 'marcadores';
let rankingMap       = new Map();
let rankingLoaded    = false;

function paisFromOrden(n) {
  const s = String(n||'').trim();
  if(s.startsWith('2')) return 'CO';
  if(s.startsWith('3')) return 'CL';
  if(s.startsWith('4')) return 'MX';
  if(s.startsWith('5')) return 'AR';
  return null;
}
function getClientePais(c) {
  for(const o of (c.ordenes||[])) { const p=paisFromOrden(o.order_number); if(p) return p; }
  return null;
}

function groupRows(rows) {
  const map = new Map();
  for(const r of rows) {
    if(!map.has(r.customer_id)) {
      map.set(r.customer_id,{customer_id:r.customer_id,email:r.email,country:r.country,
        total_cajas:r.total_cajas_cliente,total_ordenes:r.total_ordenes_cliente,ordenes:[]});
    }
    let prods=[];
    try{prods=JSON.parse(r.productos||'[]');}catch{}
    map.get(r.customer_id).ordenes.push({order_number:r.order_number,fecha_recibido:r.fecha_recibido,
      fecha_confirmado:r.fecha_confirmado,cajas_orden:r.cajas_orden,fabricantes:r.fabricantes||'',
      productos:prods.filter(p=>p.cantidad>0&&p.tipo!==null)});
  }
  return [...map.values()];
}

function badgeClass(n){ return n>=6?'badge-6up':n>=4?'badge-4':'badge-2'; }
function tipoClass(t){
  if(!t) return 'tipo-otro'; const s=t.toLowerCase();
  if(s.includes('lente')) return 'tipo-lentes';
  if(s.includes('solu'))  return 'tipo-solucion';
  if(s.includes('gota'))  return 'tipo-gotas';
  return 'tipo-otro';
}

function renderOrdenes(c) {
  return c.ordenes.map(o=>{
    const ph = o.productos.map(p=>`
      <div class="prod-item">
        <span class="prod-tipo ${tipoClass(p.tipo)}">${p.tipo||'Otro'}</span>
        <span class="prod-nombre">${p.nombre}</span>
        <span class="prod-marca">${p.marca||''}</span>
        <span class="prod-cant">&times;${p.cantidad}</span>
      </div>`).join('');
    return `
      <div class="orden-row">
        <div class="orden-meta">
          <span class="orden-num">&#128203; #${o.order_number}</span>
          <span class="orden-fecha">&#128229; P. recibido <b>${fmtDate(o.fecha_recibido)}</b></span>
          <span class="orden-fecha">&#9989; P. confirmado <b>${fmtDate(o.fecha_confirmado)}</b></span>
          <span class="orden-cajas">&#128230; ${o.cajas_orden} caja${o.cajas_orden>1?'s':''}</span>
          ${o.fabricantes?`<span class="orden-fab">&#127981; ${o.fabricantes}</span>`:''}
        </div>
        ${ph?`<div class="productos-list">${ph}</div>`:''}
      </div>`;
  }).join('');
}

function renderClienteMarcadores(c, idx) {
  const rd   = rankingMap.get((c.email||'').toLowerCase().trim());
  const pais = getClientePais(c);
  const paisNom = pais ? (PAIS_FLAGS[pais]||'')+'&nbsp;'+PAIS_NOMBRE[pais] : '&#127760; &mdash;';
  const paisCls = 'pais-'+(pais&&PAIS_NOMBRE[pais]?pais:'XX');

  let chip = '';
  if(rd){
    const med = rd.posicion===1?'&#129351;':rd.posicion===2?'&#129352;':rd.posicion===3?'&#129353;':'';
    chip = `<div class="rank-chip${rd.posicion<=3?' gold':''}">
      <span class="rank-pos">${med}#${rd.posicion}</span>
      <span class="rank-pts">${rd.puntosTotales}&nbsp;pts</span>
      <span class="rank-acc">&#9989;${rd.aciertos}</span>
    </div>`;
  } else {
    chip = `<div class="rank-chip"><span class="rank-pos" style="color:var(--gray)">Sin datos</span></div>`;
  }

  let phaseHtml = '';
  if(rd){
    const items = Object.keys(FASES).map(Number).map(f=>{
      const fd=rd.porFase[f]; const pts=fd?fd.puntos:0;
      const cls=pts===0?'ph-0':FASE_CLS(f);
      return `<div class="phase-item"><span class="ph-label">${FASE_LABELS[f]}</span><span class="ph-pts ${cls}">${pts}</span></div>`;
    }).join('');
    phaseHtml = `<div class="phase-breakdown">
      <div class="phase-breakdown-title">&#128202; Puntos por tanda / fase</div>
      <div class="phase-row">${items}</div>
    </div>`;
  }

  return `
    <div class="cliente-card" id="card-${c.customer_id}">
      <div class="cliente-header mhdr" onclick="toggleCard('${c.customer_id}')">
        <span class="cliente-rank">${idx+1}</span>
        <div class="cliente-info-col">
          ${rd&&rd.nombreCompleto?`<span class="cliente-nombre-row">${rd.nombreCompleto}</span>`:''}
          <span class="cliente-email-row">${c.email}</span>
          <span class="cliente-pais-badge ${paisCls}">${paisNom}</span>
        </div>
        ${chip}
        <span class="badge-cajas ${badgeClass(c.total_cajas)}">${c.total_cajas} cajas</span>
        <span class="toggle-icon">&#9662;</span>
      </div>
      <div class="ordenes-wrap">${phaseHtml}${renderOrdenes(c)}</div>
    </div>`;
}

function renderClienteVentas(c, idx) {
  const pO = c.ordenes[0]||{};
  const fu = [...new Set((c.ordenes.map(o=>o.fabricantes).filter(Boolean).join(', ')).split(', ').filter(Boolean))].join(', ');
  const ph = c.total_ordenes===1
    ? `<span class="hdr-order">&#128203; <b>#${pO.order_number}</b></span>
       <span class="hdr-order">&#128229; P. recibido <b>${fmtDate(pO.fecha_recibido)}</b></span>
       <span class="hdr-order">&#9989; P. confirmado <b>${fmtDate(pO.fecha_confirmado)}</b></span>
       ${fu?`<span class="hdr-fab">${fu}</span>`:''}`
    : `<span class="hdr-order">&#128722; <b>${c.total_ordenes} &oacute;rdenes</b></span>${fu?`<span class="hdr-fab">${fu}</span>`:''}`;
  return `
    <div class="cliente-card" id="card-${c.customer_id}">
      <div class="cliente-header" onclick="toggleCard('${c.customer_id}')">
        <span class="cliente-rank">${idx+1}</span>
        <span class="cliente-email">${c.email}</span>
        <span class="cliente-pais">${flag(c.country)}</span>
        ${ph}
        <span class="badge-cajas ${badgeClass(c.total_cajas)}">${c.total_cajas} cajas</span>
        <span class="toggle-icon">&#9662;</span>
      </div>
      <div class="ordenes-wrap">${renderOrdenes(c)}</div>
    </div>`;
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if(!filteredClientes.length){
    wrap.innerHTML=`<div class="status-box"><p>Sin resultados para los filtros aplicados.</p></div>`;
    document.getElementById('pagerWrap').innerHTML='';
    return;
  }
  const start = (currentPage-1)*CLIENTS_PER_PAGE;
  const slice = filteredClientes.slice(start, start+CLIENTS_PER_PAGE);
  wrap.innerHTML = viewMode==='marcadores'
    ? slice.map((c,i)=>renderClienteMarcadores(c,start+i)).join('')
    : slice.map((c,i)=>renderClienteVentas(c,start+i)).join('');
  renderPager();
}

function renderPager() {
  const total=filteredClientes.length, pages=Math.ceil(total/CLIENTS_PER_PAGE);
  const pw=document.getElementById('pagerWrap');
  if(pages<=1){pw.innerHTML='';return;}
  const p=currentPage;
  let h=`<div class="pager">`;
  h+=`<button class="pager-btn" onclick="goToPage(${p-1})" ${p===1?'disabled':''}>&#8592; Anterior</button>`;
  const vis=new Set([1,pages,p-2,p-1,p,p+1,p+2].filter(x=>x>=1&&x<=pages));
  let prev=0;
  for(const pg of [...vis].sort((a,b)=>a-b)){
    if(prev&&pg-prev>1) h+=`<span class="pager-ellipsis">&hellip;</span>`;
    h+=`<button class="pager-btn${pg===p?' active':''}" onclick="goToPage(${pg})">${pg}</button>`;
    prev=pg;
  }
  h+=`<button class="pager-btn" onclick="goToPage(${p+1})" ${p===pages?'disabled':''}>Siguiente &#8594;</button>`;
  h+=`<span class="pager-info">P&aacute;gina ${p} de ${pages} &middot; ${total.toLocaleString('es-MX')} clientes</span>`;
  h+=`</div>`;
  pw.innerHTML=h;
}

function goToPage(p){
  currentPage=Math.max(1,Math.min(p,Math.ceil(filteredClientes.length/CLIENTS_PER_PAGE)));
  renderTable(); window.scrollTo({top:0,behavior:'smooth'});
}

function renderStats(){
  const fil=filteredClientes;
  const cajas=fil.reduce((s,c)=>s+c.total_cajas,0);
  const ords=fil.reduce((s,c)=>s+c.total_ordenes,0);
  let h=`<span class="filter-label">${viewMode==='marcadores'?'Con marcadores':'Todas las ventas'}</span>
    <div class="stat-chip"><b>${fil.length.toLocaleString('es-MX')}</b> clientes</div>
    <div class="stat-chip">&#128230; <b>${cajas.toLocaleString('es-MX')}</b> cajas</div>
    <div class="stat-chip">&#128722; <b>${ords.toLocaleString('es-MX')}</b> &oacute;rdenes</div>`;
  const base=viewMode==='marcadores'?clientesBase:allVentas;
  if(base.length&&base.length!==fil.length){
    h+=`<div class="stats-divider"></div>
      <span class="filter-label">Dataset total</span>
      <div class="stat-chip"><b>${base.length.toLocaleString('es-MX')}</b> clientes</div>`;
  }
  document.getElementById('statsBar').innerHTML=h;
}

function renderPaisBar(){
  const pb=document.getElementById('paisBar');
  if(viewMode!=='marcadores'){pb.style.display='none';return;}
  const counts={CO:0,CL:0,MX:0,AR:0};
  for(const c of filteredClientes){ const p=getClientePais(c); if(p&&counts[p]!==undefined) counts[p]++; }
  const total=filteredClientes.length;
  const chips=Object.entries(counts).map(([pais,n])=>`
    <div class="pais-chip">
      <span>${PAIS_FLAGS[pais]||''}</span>
      <span>${PAIS_NOMBRE[pais]}</span>
      <span class="pais-count">${n}</span>
    </div>`).join('');
  pb.innerHTML=`<span class="pais-bar-label">&#127758; Por pa&iacute;s</span>${chips}<span class="pais-total">Total: ${total}</span>`;
  pb.style.display='flex';
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const pais=document.getElementById('paisFilter').value;
  const fab=document.getElementById('fabFilter').value;
  let base = viewMode==='marcadores'
    ? clientesBase.filter(c=>rankingMap.has((c.email||'').toLowerCase().trim()))
    : allClientes;
  filteredClientes=base.filter(c=>{
    if(q&&!c.email.toLowerCase().includes(q)) return false;
    if(pais){
      const cp = viewMode==='marcadores'?getClientePais(c):c.country;
      if(cp!==pais) return false;
    }
    if(fab&&!c.ordenes.some(o=>(o.fabricantes||'').includes(fab))) return false;
    return true;
  });
  const to=filteredClientes.reduce((s,c)=>s+c.total_ordenes,0);
  document.getElementById('btnCsv').textContent=`⬇️ Descargar CSV (${to.toLocaleString('es-MX')} órdenes)`;
  currentPage=1;
  renderStats();
  renderPaisBar();
  renderTable();
}

function populatePaisFilter(){
  const sel=document.getElementById('paisFilter'), actual=sel.value;
  if(viewMode==='marcadores'){
    sel.innerHTML=`<option value="">&#127758; Todos los pa&iacute;ses</option>`+
      ['CO','CL','MX','AR'].map(p=>`<option value="${p}">${PAIS_FLAGS[p]||''} ${PAIS_NOMBRE[p]}</option>`).join('');
  } else {
    const paises=[...new Set(allClientes.map(c=>c.country).filter(Boolean))].sort();
    sel.innerHTML=`<option value="">&#127758; Todos los pa&iacute;ses</option>`+
      paises.map(p=>`<option value="${p}">${flag(p)}</option>`).join('');
  }
  if([...sel.options].some(o=>o.value===actual)) sel.value=actual;
}

function populateFabFilter(){
  const sel=document.getElementById('fabFilter'), actual=sel.value;
  const base=viewMode==='marcadores'
    ?clientesBase.filter(c=>rankingMap.has((c.email||'').toLowerCase().trim()))
    :allClientes;
  const fabs=[...new Set(base.flatMap(c=>c.ordenes.flatMap(o=>(o.fabricantes||'').split(', '))).filter(Boolean))].sort();
  sel.innerHTML=`<option value="">&#127981; Todos los fabricantes</option>`+
    fabs.map(f=>`<option value="${f}">${f}</option>`).join('');
  if([...sel.options].some(o=>o.value===actual)) sel.value=actual;
}

function setMode(mode){
  viewMode=mode;
  document.getElementById('tab-marcadores').classList.toggle('active',mode==='marcadores');
  document.getElementById('tab-ventas').classList.toggle('active',mode==='ventas');
  if(mode==='ventas'&&!allVentas.length){ loadVentas(); return; }
  allClientes = mode==='ventas'?allVentas:clientesBase;
  document.getElementById('searchInput').value='';
  document.getElementById('paisFilter').value='';
  document.getElementById('fabFilter').value='';
  populatePaisFilter();
  populateFabFilter();
  applyFilters();
}

function toggleCard(id){ document.getElementById('card-'+id).classList.toggle('open'); }

function escCsv(v){ if(v==null) return ''; const s=String(v); return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s; }

function downloadCSV(){
  if(!filteredClientes.length){alert('No hay clientes para exportar.');return;}
  const esMar=viewMode==='marcadores';
  const headers=['Lista#','Customer ID','Email','País',
    ...(esMar?['País DB']:['País DB']),
    'Total Cajas','Total Órdenes',
    ...(esMar?['Ranking Global','Puntos Totales','Aciertos']:[]),
    'Núm. Orden','Fecha Recibido','Fecha Confirmado','Cajas Orden','Fabricantes','Productos'];
  const rows=[];
  filteredClientes.forEach((c,idx)=>{
    const pais=esMar?(getClientePais(c)||''):(c.country||'');
    const rd=esMar?rankingMap.get((c.email||'').toLowerCase().trim()):null;
    if(!c.ordenes.length){
      rows.push([idx+1,c.customer_id,c.email,pais,c.country,c.total_cajas,c.total_ordenes,
        ...(esMar?[rd?rd.posicion:'',rd?rd.puntosTotales:'',rd?rd.aciertos:'']:[]),
        '','','','','','']);
    } else {
      c.ordenes.forEach(o=>{
        const ps=o.productos.length?o.productos.map(p=>`${p.nombre}${p.marca?' ('+p.marca+')':''} ×${p.cantidad}`).join(' | '):'';
        rows.push([idx+1,c.customer_id,c.email,pais,c.country,c.total_cajas,c.total_ordenes,
          ...(esMar?[rd?rd.posicion:'',rd?rd.puntosTotales:'',rd?rd.aciertos:'']:[]),
          o.order_number,o.fecha_recibido||'',o.fecha_confirmado||'',o.cajas_orden,o.fabricantes||'',ps]);
      });
    }
  });
  const csv=[headers,...rows].map(r=>r.map(escCsv).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`clientes_lentesplus_${viewMode}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

async function loadRanking(){
  try{
    const [participants,resultados]=await Promise.all([fetchPronosticos(),fetchResultadosSheets()]);
    const ranking=calcularRanking(participants,resultados);
    rankingMap.clear();
    for(const r of ranking){ if(r.correo) rankingMap.set(r.correo.toLowerCase().trim(),r); }
    rankingLoaded=true;
    console.log('[Ranking]',rankingMap.size,'participantes');
  }catch(e){
    console.warn('[Ranking] Error:',e.message);
    rankingLoaded=true;
  }
}

function cacheLabel(j){
  const t=new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  if(!j.fromCache) return '🔴 Metabase: '+t;
  const age=j.ageMin!=null?' ('+j.ageMin+' min)':'';
  const spin=j.stale&&j.refreshing?' 🔄':'';
  return '⚡ Caché'+age+spin+' · '+t;
}

async function loadVentas(){
  const wrap=document.getElementById('tableWrap');
  wrap.innerHTML=`<div class="status-box"><div class="spinner"></div><p>Consultando todas las ventas&hellip;</p></div>`;
  try{
    const res=await fetch('/api/ventas');
    const json=await res.json();
    if(!res.ok||json.error) throw new Error(json.error||'Error HTTP '+res.status);
    allVentas=groupRows(json.rows||[]);
    allClientes=allVentas;
    populatePaisFilter(); populateFabFilter(); applyFilters();
    document.getElementById('lastUpdate').textContent=cacheLabel(json);
  }catch(err){
    wrap.innerHTML=`<div class="status-box"><p>&#9888;&#65039; No se pudo cargar</p><small>${err.message}</small></div>`;
  }
}

async function loadClientes(force){
  const btn=document.getElementById('btnRefresh'),wrap=document.getElementById('tableWrap');
  btn.disabled=true; btn.textContent='⏳ Cargando…';
  document.getElementById('btnCsv').disabled=true;
  document.getElementById('statsBar').innerHTML='<div class="stat-chip">⏳ Cargando…</div>';
  document.getElementById('pagerWrap').innerHTML='';
  document.getElementById('paisBar').style.display='none';
  if(!force) wrap.innerHTML=`<div class="status-box"><div class="spinner"></div><p>Cargando datos y ranking&hellip;</p></div>`;
  try{
    const [clientesMeta]=await Promise.all([
      fetch('/api/clientes'+(force?'?force=1':'')).then(r=>r.json()).then(j=>{
        if(j.error) throw new Error(j.error); return j;
      }),
      rankingLoaded?Promise.resolve():loadRanking()
    ]);
    clientesBase=groupRows(clientesMeta.rows||[]);
    allClientes=clientesBase;
    populatePaisFilter(); populateFabFilter(); applyFilters();
    document.getElementById('lastUpdate').textContent=cacheLabel(clientesMeta)+(force?' (forzado)':'');
  }catch(err){
    wrap.innerHTML=`<div class="status-box"><p>&#9888;&#65039; No se pudo cargar la información</p><small>${err.message}</small></div>`;
    document.getElementById('statsBar').innerHTML='<div class="stat-chip" style="color:var(--red)">&#9888;&#65039; Error</div>';
  }finally{
    btn.disabled=false; btn.textContent='\u{1F504} Actualizar';
    document.getElementById('btnCsv').disabled=false;
  }
}

function reloadData(){
  if(viewMode==='ventas') loadVentas();
  else loadClientes(true);
}

loadClientes(false);
</script>
